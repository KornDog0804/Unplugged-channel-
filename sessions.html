<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <script>
    // ===== DEVICE DETECTION (TV / Desktop / Phone) =====
    // Runs immediately so styling.css can target html.device-tv etc.
    // with no flash of the wrong layout.
    (function () {
      try {
        var ua = navigator.userAgent || "";
        var isTvUA = /googletv|google tv|smart-tv|smarttv|appletv|hbbtv|netcast|viera|aquos|bravia(?!.*mobile)|roku|tizen|web0s|androidtv|crkey|adt-?\d/i.test(ua);
        var hasTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints > 0);
        var pointerNone = window.matchMedia && window.matchMedia('(pointer: none)').matches;
        var pointerFine = window.matchMedia && window.matchMedia('(pointer: fine)').matches;
        var isWide = window.innerWidth >= 960;

        var cls = "device-phone";
        if (isTvUA || pointerNone || (!hasTouch && !pointerFine && isWide)) {
          cls = "device-tv";
        } else if (!hasTouch && pointerFine) {
          cls = "device-desktop";
        }
        document.documentElement.classList.add(cls);
      } catch (_) {
        document.documentElement.classList.add("device-phone");
      }
    })();
  </script>

  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Joey’s Concert Corner — Sessions</title>

  <link rel="stylesheet" href="./styles.css" />

  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#07070a">
  <meta name="description" content="Stripped & unplugged sessions — handpicked only.">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Acoustic Corner">
</head>

<body class="sessions">

  <!-- HEADER -->
  <header class="top">
    <div class="brand">
      <div class="brandMark"></div>
      <div class="brandText">
        <div class="titleRow">
          <div class="title">JOEY’S CONCERT CORNER</div>
          <div class="liveBadge">
            <span class="liveDot"></span> LIVE
          </div>
        </div>
        <div class="sub">
          <span class="subStrong">Stripped and Electric - Unplugged Sessions/Live Concerts</span>
          <span class="subSep">—</span>
          <span>handpicked only.</span>
        </div>
      </div>
    </div>
  </header>

  <!-- PLAYER SECTION -->
  <section class="playerShell">

    <div class="playerTop">

      <div class="npArtWrap" id="npArtWrap">
        <img id="npArt" class="npArt" alt="" />
      </div>

      <div class="npBlock">
        <div class="npTitle" id="nowPlayingTitle">Now Playing</div>
        <div class="npLine" id="nowPlayingLine">
          Pick a session below 👇
        </div>
      </div>

      <div class="npBtns">
        <a
          id="watchOnTvBtn"
          class="btn ghost"
          href="#"
          target="_blank"
          rel="noopener"
        >
          Watch on TV
        </a>

        <button
          id="playerToggleBtn"
          class="btn"
          type="button"
        >
          Show player
        </button>
      </div>

    </div>

    <!-- YOUTUBE IFRAME -->
    <div class="playerFrameWrap">
      <iframe
        id="playerFrame"
        title="YouTube Player"
        loading="lazy"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
      ></iframe>
    </div>

    <div id="status" class="statusLine"></div>

  </section>

  <!-- MAIN LIST -->
  <main class="wrap">

    <section class="listHead">
      <div class="listTitle">Sessions</div>
      <div class="listSub">
        Swipe left/right on mobile to go back or forward.
        Tap into folders. Queues stitch tracks together automatically.
      </div>
    </section>

    <button id="playAllBtn" class="btn wide" type="button">
      Play All
    </button>

    <div id="episodes" class="episodes"></div>

    <button
      id="loadMoreBtn"
      class="btn wide ghost"
      type="button"
    >
      Load more
    </button>

    <div class="backRow">
      <!--
        Smart back button: inside any folder this reads "Back to Sessions"
        and steps back one level. Only at the root list does it actually
        leave to the home page. Label/behavior controlled by app.js.
      -->
      <button id="backNavBtn" class="btn ghost" type="button">
        ← Back to home
      </button>
    </div>

  </main>

  <!-- APP SCRIPT -->
  <script src="./app.js"></script>

  <!-- TV REMOTE NAVIGATION (only activates on TV devices) -->
  <script src="./tv-nav.js"></script>

</body>
</html>
