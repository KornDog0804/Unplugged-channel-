name: Discover New Shows

on:
  schedule:
    - cron: "0 10 * * 1"
    - cron: "0 10 * * 4"
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run discovery bot
        run: node scripts/discover-shows.js

      - name: Commit discovery results
        run: |
          git config user.name "concert-corner-bot"
          git config user.email "actions@github.com"

          git add data/discovery-candidates.json

          git diff --staged --quiet || git commit -m "🎸 Discovery bot: new concert candidates $(date +'%Y-%m-%d')"

          git push
